<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房价数据可视化平台</title>
    <link rel="stylesheet" href="style.css?v=20260511b">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- 标题栏 -->
        <header class="header">
            <h1>中国70个大中城市房价指数</h1>
            <button class="update-data-btn" id="updateDataBtn" onclick="triggerDataUpdate()">
                <span class="update-icon">↻</span> 更新数据
            </button>
        </header>

        <!-- 更新进度弹窗 -->
        <div class="update-modal-overlay" id="updateModalOverlay">
            <div class="update-modal">
                <div class="update-modal-header">
                    <span class="update-modal-title" id="updateModalTitle">正在更新数据</span>
                </div>
                <div class="update-modal-body">
                    <div class="update-progress-bar-wrap">
                        <div class="update-progress-bar" id="updateProgressBar"></div>
                    </div>
                    <div class="update-log" id="updateLog"></div>
                </div>
                <div class="update-modal-footer" id="updateModalFooter" style="display:none;">
                    <button class="update-modal-close-btn" onclick="closeUpdateModal()">关闭</button>
                </div>
            </div>
        </div>

        <!-- 主体内容：左图表 + 右控制 -->
        <div class="main-layout">

            <!-- 左侧：图表 + 数据统计 -->
            <div class="chart-panel">
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>正在加载数据...</p>
                </div>
                <div class="no-data" id="noData" style="display: none;">
                    <p>请选择城市以查看数据</p>
                </div>

                <!-- 数据统计 -->
                <div class="stats-row" id="statsSection" style="display: none;">
                    <div class="stat-item">
                        <span class="stat-label">数据点</span>
                        <span class="stat-value" id="dataCount">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">时间范围</span>
                        <span class="stat-value" id="timeRange">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">环比最高</span>
                        <span class="stat-value" id="monthMax">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">环比最低</span>
                        <span class="stat-value" id="monthMin">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">同比最高</span>
                        <span class="stat-value" id="yearMax">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">同比最低</span>
                        <span class="stat-value" id="yearMin">-</span>
                    </div>
                </div>
            </div>

            <!-- 右侧：控制面板 -->
            <div class="control-panel">
                <!-- 展示内容选择 -->
                <div class="control-section">
                    <h3>展示内容</h3>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="content-type" value="new_house_basic" checked>
                            <span>新建商品住宅价格指数</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="content-type" value="used_house_basic">
                            <span>二手住宅价格指数</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="content-type" value="new_house_classified">
                            <span>新建商品住宅分类指数</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="content-type" value="used_house_classified">
                            <span>二手住宅分类指数</span>
                        </label>
                    </div>

                    <!-- 分类指数子选项 -->
                    <div class="classification-options" id="classificationOptions" style="display: none;">
                        <h4>面积分类</h4>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="area-type" value="90_below" checked>
                                <span>90平米以下</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="area-type" value="90_144">
                                <span>90–144平米</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="area-type" value="144_above">
                                <span>144平米以上</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- 城市选择 -->
                <div class="city-section">
                    <h3>选择城市</h3>
                    <div class="city-grid" id="cityGrid">
                        <!-- 城市单选按钮将由JavaScript动态生成 -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js?v=20250912"></script>
</body>
</html>
