<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规模以上工业企业 - 数据可视化</title>
    <link rel="stylesheet" href="style.css?v=20260714">
    <script src="navigation.js?v=20260714-assets" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        html, body { overflow: auto !important; height: auto !important; background: #f5f6fa; }
        .cw { position: relative; height: 380px; }

        .tbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
        .tbar span { font-size: 13px; color: #666; font-weight: 600; }
        .tbar input[type=month] { padding: 4px 8px; border: 1.5px solid #dde; border-radius: 6px; font-size: 13px; }
        .tb-btn { padding: 5px 14px; border-radius: 18px; border: 1.5px solid #dde; background: #fff; cursor: pointer; font-size: 13px; color: #666; }
        .tb-btn:hover { border-color: #667eea; color: #667eea; }
        .tb-btn.on { background: #667eea; color: #fff; border-color: #667eea; }

        .marker-panel { margin: -2px 0 14px; padding: 12px 14px; border: 1px solid #e8eaf2; border-radius: 10px; background: #fff; }
        .marker-form { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .marker-form > span { margin-right: 2px; color: #666; font-size: 13px; font-weight: 600; }
        .marker-form + .marker-form { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e8eaf2; }
        .marker-form input[type=month],
        .marker-form input[type=text],
        .marker-form select { height: 32px; padding: 4px 8px; border: 1.5px solid #dde; border-radius: 6px; background: #fff; color: #555; font-size: 13px; }
        .marker-form input[type=text] { width: 180px; }
        .marker-form input[type=color] { width: 38px; height: 32px; padding: 2px; border: 1.5px solid #dde; border-radius: 6px; background: #fff; cursor: pointer; }
        .marker-add { height: 32px; padding: 0 14px; border: 0; border-radius: 16px; background: #667eea; color: #fff; font-size: 13px; cursor: pointer; }
        .marker-add:hover { background: #5a6fd6; }
        .annotation-list-section { margin-top: 22px; padding-top: 14px; border-top: 1px solid #edf0f5; }
        .annotation-list-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 0 9px; color: #596579; font-size: 13px; font-weight: 700; }
        .annotation-save-status { color: #8b95a7; font-size: 11px; font-weight: 400; }
        .annotation-save-status.error { color: #dc2626; }
        .marker-list { display: grid; gap: 8px; }
        .marker-item { display: grid; grid-template-columns: 20px 48px minmax(0, 1fr) 24px; align-items: center; gap: 8px; min-height: 34px; padding: 5px 7px 5px 9px; border: 1px solid #e5e7ef; border-radius: 8px; background: #fafbfc; color: #596579; font-size: 12px; }
        .region-group { padding: 10px; border: 1px solid color-mix(in srgb, var(--region-color) 38%, #e5e7ef); border-radius: 10px; background: color-mix(in srgb, var(--region-color) 7%, #fff); }
        .region-header { display: grid; grid-template-columns: 20px 48px minmax(0, 1fr) 24px; align-items: center; gap: 8px; color: #4f5c70; font-size: 12px; }
        .region-markers { display: grid; gap: 6px; margin: 9px 0 0 28px; padding: 8px 0 0 12px; border-top: 1px dashed color-mix(in srgb, var(--region-color) 30%, #e5e7ef); border-left: 2px solid color-mix(in srgb, var(--region-color) 38%, #e5e7ef); }
        .region-markers .marker-item { background: rgba(255,255,255,.78); }
        .marker-swatch { width: 18px; height: 0; border-top: 2px solid var(--marker-color); }
        .marker-swatch.dashed { border-top-style: dashed; }
        .marker-swatch.dotted { border-top-style: dotted; }
        .marker-swatch.region { height: 12px; border: 1px solid var(--marker-color); border-radius: 3px; background: color-mix(in srgb, var(--marker-color) 20%, transparent); }
        .annotation-kind { color: #8b95a7; font-size: 11px; font-weight: 700; }
        .annotation-text { min-width: 0; overflow-wrap: anywhere; }
        .annotation-edit { min-width: 0; width: 100%; height: 26px; padding: 3px 7px; border: 1.5px solid #8b5cf6; border-radius: 5px; outline: none; color: #596579; font: inherit; box-sizing: border-box; }
        .annotation-empty { padding: 9px 10px; border: 1px dashed #dfe3ec; border-radius: 8px; color: #a0a7b4; font-size: 12px; text-align: center; }
        .marker-remove { width: 18px; height: 18px; border: 0; border-radius: 50%; background: #eceef4; color: #7c879b; line-height: 18px; cursor: pointer; }
        .marker-remove:hover { background: #fee2e2; color: #dc2626; }

        .src { margin-top: 10px; font-size: 11px; color: #bbb; border-top: 1px solid #f5f5f5; padding-top: 8px; }
        .src a { color: #667eea; }

        /* 时间范围拖动条 */
        .rng { margin: 26px 4px 6px; user-select: none; }
        .rng-track { position: relative; height: 6px; background: #ececf4; border-radius: 3px; margin: 40px 12px 0; touch-action: none; }
        .rng-fill { position: absolute; top: -3px; height: 12px; background: rgba(102,126,234,0.14); border: 1px solid rgba(102,126,234,0.35); border-radius: 4px; box-sizing: border-box; }
        .rng-thumb { position: absolute; top: 50%; width: 16px; height: 26px; transform: translate(-50%,-50%); background: #fff; border: 1.5px solid #667eea; border-radius: 5px; cursor: grab; box-shadow: 0 1px 5px rgba(102,126,234,0.35); display: flex; align-items: center; justify-content: center; gap: 3px; touch-action: none; z-index: 2; }
        .rng-thumb::before, .rng-thumb::after { content: ''; width: 1.5px; height: 10px; background: #b7c0f0; border-radius: 1px; }
        .rng-thumb:active { cursor: grabbing; }
        .rng-lab { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 600; color: #667eea; white-space: nowrap; pointer-events: none; }
        .rng-ticks { position: relative; height: 16px; margin: 10px 12px 0; }
        .rng-tick { position: absolute; transform: translateX(-50%); font-size: 11px; color: #999; white-space: nowrap; }
        .rng-tick::before { content: ''; position: absolute; top: -8px; left: 50%; width: 1px; height: 4px; background: #dcdce4; }

        @media (max-width: 700px) {
            .marker-form { align-items: stretch; }
            .marker-form > span { width: 100%; }
            .marker-form input[type=text] { flex: 1; width: 140px; }
        }

    </style>
</head>
<body>
<div class="dashboard-container">
    <header class="page-header">
        <h1>规模以上工业企业</h1>
        <div class="page-header-actions">
            <div data-category-nav></div>
            <button class="update-data-btn" id="updateIndustryBtn" type="button">
                <span class="update-icon">↻</span> 更新数据
            </button>
        </div>
    </header>

    <div class="update-modal-overlay" id="industryUpdateModal">
        <div class="update-modal">
            <div class="update-modal-header">
                <span class="update-modal-title" id="industryUpdateTitle">正在更新工业企业数据</span>
            </div>
            <div class="update-modal-body">
                <div class="update-progress-bar-wrap">
                    <div class="update-progress-bar" id="industryUpdateProgress"></div>
                </div>
                <div class="update-log" id="industryUpdateLog"></div>
            </div>
            <div class="update-modal-footer" id="industryUpdateFooter" style="display:none;">
                <button class="update-modal-close-btn" id="closeIndustryUpdateBtn" type="button">关闭</button>
            </div>
        </div>
    </div>

    <div class="summary-grid" id="sc"></div>

    <!-- 时间范围 -->
    <div class="tbar">
        <span>时间范围</span>
        <input type="month" id="ts">
        <span style="color:#999">—</span>
        <input type="month" id="te">
        <span class="tb-btn on" onclick="setRange('1y')">近1年</span>
        <span class="tb-btn" onclick="setRange('3y')">近3年</span>
        <span class="tb-btn" onclick="setRange('all')">全部</span>
    </div>

    <div class="marker-panel">
        <div class="marker-form">
            <span>竖线标记</span>
            <input type="month" id="markerDate" aria-label="标记月份">
            <input type="text" id="markerLabel" maxlength="60" placeholder="注释（可选）" aria-label="竖线注释">
            <input type="color" id="markerColor" value="#8b5cf6" title="竖线颜色" aria-label="竖线颜色">
            <select id="markerStyle" aria-label="竖线线型">
                <option value="solid">实线</option>
                <option value="dashed">虚线</option>
                <option value="dotted">点线</option>
            </select>
            <button type="button" class="marker-add" id="markerAdd">添加竖线</button>
        </div>
        <div class="marker-form">
            <span>时间段区域</span>
            <input type="month" id="regionStart" aria-label="区域开始月份">
            <span style="color:#999">—</span>
            <input type="month" id="regionEnd" aria-label="区域结束月份">
            <input type="text" id="regionLabel" maxlength="60" placeholder="区域注释" aria-label="区域注释">
            <input type="color" id="regionColor" value="#f59e0b" title="区域颜色" aria-label="区域颜色">
            <button type="button" class="marker-add" id="regionAdd">添加区域</button>
        </div>
    </div>

    <div class="dashboard-section">
        <h2>营业收入 / 产成品存货 累积同比增速 (%)</h2>
        <div class="cw"><canvas id="chart"></canvas></div>

        <div class="rng">
            <div class="rng-track" id="rngTrack">
                <div class="rng-fill" id="rngFill"></div>
                <div class="rng-thumb" id="thumbA"><span class="rng-lab" id="labA"></span></div>
                <div class="rng-thumb" id="thumbB"><span class="rng-lab" id="labB"></span></div>
            </div>
            <div class="rng-ticks" id="rngTicks"></div>
        </div>

        <div class="annotation-list-section">
            <div class="annotation-list-title">
                <span>时间注释（按时间顺序）</span>
                <span class="annotation-save-status" id="annotationSaveStatus"></span>
            </div>
            <div class="marker-list" id="markerList" aria-live="polite"></div>
        </div>

        <div class="src">📎 数据来源：国家统计局 · 最新 <a id="srcLink" href="#" target="_blank">查看原文</a></div>
    </div>
</div>

<script>
const COLORS = { revenue: '#e74c3c', inventory: '#3498db' };
const MARKER_STORAGE_KEY = 'industry-chart-markers-v1';
const REGION_STORAGE_KEY = 'industry-chart-regions-v1';
const ANNOTATION_MIGRATION_KEY = 'industry-chart-annotations-repo-migrated-v1';
const ANNOTATION_API = '/api/industry/annotations';
const LINE_DASHES = { solid: [], dashed: [7, 5], dotted: [2, 4] };

let RD = null, chart = null;
let ts = '2022-01', te = '2026-12';
let allKeys = [], ai = 0, bi = 0, dragThumb = null;
let markers = [];
let regions = [];
let annotationSaveQueue = Promise.resolve();
let annotationSaveVersion = 0;
let industryUpdatePollTimer = null;

function parseDate(s) { const [y,m] = s.split('-').map(Number); return new Date(y,m-1,1); }

const verticalMarkerPlugin = {
    id: 'verticalMarkers',
    beforeDatasetsDraw(chartInstance) {
        const { ctx, chartArea, scales } = chartInstance;
        const xScale = scales.x;
        if (!chartArea || !xScale) return;

        ctx.save();
        ctx.beginPath();
        ctx.rect(chartArea.left, chartArea.top, chartArea.width, chartArea.height);
        ctx.clip();
        regions.forEach(region => {
            const rawStart = xScale.getPixelForValue(parseDate(region.start).getTime());
            const rawEnd = xScale.getPixelForValue(parseDate(region.end).getTime());
            if (!Number.isFinite(rawStart) || !Number.isFinite(rawEnd)) return;
            const left = Math.max(chartArea.left, Math.min(rawStart, rawEnd));
            const right = Math.min(chartArea.right, Math.max(rawStart, rawEnd));
            if (right < chartArea.left || left > chartArea.right || right <= left) return;

            ctx.fillStyle = `${region.color}26`;
            ctx.fillRect(left, chartArea.top, right - left, chartArea.height);
            ctx.strokeStyle = `${region.color}99`;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 3]);
            ctx.strokeRect(left, chartArea.top, right - left, chartArea.height);
        });
        ctx.restore();
    },
    afterDatasetsDraw(chartInstance) {
        const { ctx, chartArea, scales } = chartInstance;
        const xScale = scales.x;
        if (!chartArea || !xScale) return;

        ctx.save();
        markers.forEach((marker, index) => {
            const x = xScale.getPixelForValue(parseDate(marker.date).getTime());
            if (!Number.isFinite(x) || x < chartArea.left || x > chartArea.right) return;

            ctx.save();
            ctx.beginPath();
            ctx.rect(chartArea.left, chartArea.top, chartArea.width, chartArea.height);
            ctx.clip();
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x, chartArea.bottom);
            ctx.strokeStyle = marker.color;
            ctx.lineWidth = 2;
            ctx.setLineDash(LINE_DASHES[marker.style] || []);
            ctx.stroke();
            ctx.restore();

            if (!marker.label) return;
            ctx.font = '600 11px "Segoe UI", sans-serif';
            const paddingX = 6;
            const labelWidth = ctx.measureText(marker.label).width + paddingX * 2;
            const labelHeight = 20;
            const labelX = Math.min(
                Math.max(x - labelWidth / 2, chartArea.left + 2),
                chartArea.right - labelWidth - 2
            );
            const labelY = chartArea.top + 5 + (index % 2) * 24;
            ctx.fillStyle = marker.color;
            ctx.beginPath();
            ctx.roundRect(labelX, labelY, labelWidth, labelHeight, 4);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(marker.label, labelX + labelWidth / 2, labelY + labelHeight / 2);
        });

        regions.forEach((region, index) => {
            if (!region.label) return;
            const rawStart = xScale.getPixelForValue(parseDate(region.start).getTime());
            const rawEnd = xScale.getPixelForValue(parseDate(region.end).getTime());
            if (!Number.isFinite(rawStart) || !Number.isFinite(rawEnd)) return;
            const left = Math.max(chartArea.left, Math.min(rawStart, rawEnd));
            const right = Math.min(chartArea.right, Math.max(rawStart, rawEnd));
            if (right <= left) return;

            ctx.font = '600 11px "Segoe UI", sans-serif';
            const paddingX = 6;
            const maxWidth = Math.max(0, right - left - paddingX * 2);
            let label = region.label;
            while (label.length > 1 && ctx.measureText(`${label}…`).width > maxWidth) {
                label = label.slice(0, -1);
            }
            if (!label || maxWidth < 12) return;
            if (label !== region.label) label += '…';
            const labelWidth = Math.min(ctx.measureText(label).width + paddingX * 2, right - left);
            const labelHeight = 20;
            const labelX = left + (right - left - labelWidth) / 2;
            const labelY = chartArea.bottom - 25 - (index % 2) * 24;
            ctx.fillStyle = region.color;
            ctx.beginPath();
            ctx.roundRect(labelX, labelY, labelWidth, labelHeight, 4);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, labelX + labelWidth / 2, labelY + labelHeight / 2);
        });
        ctx.restore();
    }
};

function filterMarkers(saved) {
    if (!Array.isArray(saved)) return [];
    return saved.filter(marker =>
        typeof marker.id === 'string' &&
        /^\d{4}-\d{2}$/.test(marker.date) &&
        typeof marker.label === 'string' &&
        /^#[0-9a-f]{6}$/i.test(marker.color) &&
        Object.hasOwn(LINE_DASHES, marker.style)
    );
}

function filterRegions(saved) {
    if (!Array.isArray(saved)) return [];
    return saved.filter(region =>
        typeof region.id === 'string' &&
        /^\d{4}-\d{2}$/.test(region.start) &&
        /^\d{4}-\d{2}$/.test(region.end) &&
        region.start < region.end &&
        typeof region.label === 'string' &&
        /^#[0-9a-f]{6}$/i.test(region.color)
    );
}

function loadLocalMarkers() {
    try {
        const saved = JSON.parse(localStorage.getItem(MARKER_STORAGE_KEY) || '[]');
        return filterMarkers(saved);
    } catch (_) {
        return [];
    }
}

function loadLocalRegions() {
    try {
        const saved = JSON.parse(localStorage.getItem(REGION_STORAGE_KEY) || '[]');
        return filterRegions(saved);
    } catch (_) {
        return [];
    }
}

function cacheAnnotationsLocally() {
    try {
        localStorage.setItem(MARKER_STORAGE_KEY, JSON.stringify(markers));
        localStorage.setItem(REGION_STORAGE_KEY, JSON.stringify(regions));
    } catch (_) {
        // 仓库文件是主存储，本地缓存失败不影响保存。
    }
}

function setAnnotationSaveStatus(message, isError = false) {
    const status = document.getElementById('annotationSaveStatus');
    status.textContent = message;
    status.classList.toggle('error', isError);
}

function hasMigratedLocalAnnotations() {
    try {
        return localStorage.getItem(ANNOTATION_MIGRATION_KEY) === '1';
    } catch (_) {
        return false;
    }
}

function markLocalAnnotationsMigrated() {
    try {
        localStorage.setItem(ANNOTATION_MIGRATION_KEY, '1');
    } catch (_) {
        // 浏览器禁用本地存储时，仓库文件保存仍然有效。
    }
}

function persistAnnotations() {
    const payload = JSON.stringify({ markers, regions });
    const saveVersion = ++annotationSaveVersion;
    setAnnotationSaveStatus('正在保存到仓库文件…');
    const request = annotationSaveQueue.catch(() => {}).then(async () => {
        const response = await fetch(ANNOTATION_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: payload
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok) {
            throw new Error(result.message || `HTTP ${response.status}`);
        }
        if (saveVersion === annotationSaveVersion) {
            setAnnotationSaveStatus('已保存到 results/industry_annotations.json');
        }
    });
    annotationSaveQueue = request;
    request.catch(error => {
        if (saveVersion === annotationSaveVersion) {
            setAnnotationSaveStatus(`保存失败：${error.message}`, true);
        }
    });
    return request;
}

async function loadAnnotations() {
    const localMarkers = loadLocalMarkers();
    const localRegions = loadLocalRegions();
    try {
        const response = await fetch(ANNOTATION_API, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        markers = filterMarkers(data.markers);
        regions = filterRegions(data.regions);

        const hasRepositoryData = markers.length || regions.length;
        const hasLocalData = localMarkers.length || localRegions.length;
        const hasMigrated = hasMigratedLocalAnnotations();
        if (!hasRepositoryData && hasLocalData && !hasMigrated) {
            markers = localMarkers;
            regions = localRegions;
            await persistAnnotations();
            markLocalAnnotationsMigrated();
        } else {
            cacheAnnotationsLocally();
            if (hasRepositoryData) markLocalAnnotationsMigrated();
            setAnnotationSaveStatus('已从仓库文件加载');
        }
    } catch (error) {
        markers = localMarkers;
        regions = localRegions;
        setAnnotationSaveStatus(`仓库标注加载失败：${error.message}`, true);
    }
}

function saveMarkers() {
    cacheAnnotationsLocally();
    persistAnnotations().catch(() => {});
}

function saveRegions() {
    cacheAnnotationsLocally();
    persistAnnotations().catch(() => {});
}

function renderMarkerList() {
    const list = document.getElementById('markerList');
    list.replaceChildren();
    if (!markers.length && !regions.length) {
        const empty = document.createElement('div');
        empty.className = 'annotation-empty';
        empty.textContent = '暂无竖线或时间段区域';
        list.appendChild(empty);
        return;
    }

    function createRemoveButton(data, kind, description) {
        const remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'marker-remove';
        remove.textContent = '×';
        remove.title = kind === 'region' ? '删除该区域' : '删除该竖线';
        remove.setAttribute('aria-label', `删除 ${description}`);
        remove.addEventListener('click', () => {
            if (kind === 'region') {
                regions = regions.filter(region => region.id !== data.id);
                saveRegions();
            } else {
                markers = markers.filter(marker => marker.id !== data.id);
                saveMarkers();
            }
            renderMarkerList();
            chart?.draw();
        });
        return remove;
    }

    function enableLabelEditing(container, text, data, kind) {
        container.title = '双击修改说明';
        container.addEventListener('dblclick', event => {
            if (event.target.closest('.marker-remove') || container.querySelector('.annotation-edit')) return;

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'annotation-edit';
            input.maxLength = 60;
            input.value = data.label || '';
            input.setAttribute('aria-label', kind === 'region' ? '修改区域说明' : '修改竖线说明');
            text.replaceWith(input);
            input.focus();
            input.select();

            let editing = true;
            const finish = save => {
                if (!editing) return;
                editing = false;
                if (save) {
                    data.label = input.value.trim();
                    if (kind === 'region') saveRegions();
                    else saveMarkers();
                    chart?.draw();
                }
                renderMarkerList();
            };
            input.addEventListener('keydown', keyEvent => {
                if (keyEvent.key === 'Enter') {
                    keyEvent.preventDefault();
                    finish(true);
                } else if (keyEvent.key === 'Escape') {
                    keyEvent.preventDefault();
                    finish(false);
                }
            });
            input.addEventListener('blur', () => finish(true));
        });
    }

    function createMarkerItem(marker) {
        const item = document.createElement('span');
        item.className = 'marker-item';

        const swatch = document.createElement('i');
        swatch.className = `marker-swatch ${marker.style}`;
        swatch.style.setProperty('--marker-color', marker.color);

        const kindLabel = document.createElement('span');
        kindLabel.className = 'annotation-kind';
        kindLabel.textContent = '竖线';

        const text = document.createElement('span');
        text.className = 'annotation-text';
        text.textContent = `${marker.date}${marker.label ? ` · ${marker.label}` : ''}`;

        item.append(swatch, kindLabel, text, createRemoveButton(marker, 'marker', text.textContent));
        enableLabelEditing(item, text, marker, 'marker');
        return item;
    }

    const sortedRegions = [...regions].sort((a, b) =>
        a.start.localeCompare(b.start) || a.end.localeCompare(b.end)
    );
    const regionAssignments = new Map(sortedRegions.map(region => [region.id, []]));
    const standaloneMarkers = [];

    [...markers].sort((a, b) => a.date.localeCompare(b.date)).forEach(marker => {
        const containingRegions = sortedRegions.filter(region =>
            marker.date >= region.start && marker.date <= region.end
        );
        if (!containingRegions.length) {
            standaloneMarkers.push(marker);
            return;
        }
        containingRegions.sort((a, b) => {
            const aSpan = parseDate(a.end) - parseDate(a.start);
            const bSpan = parseDate(b.end) - parseDate(b.start);
            return aSpan - bSpan || a.start.localeCompare(b.start);
        });
        regionAssignments.get(containingRegions[0].id).push(marker);
    });

    const topLevelItems = [
        ...sortedRegions.map(region => ({ kind: 'region', date: region.start, data: region })),
        ...standaloneMarkers.map(marker => ({ kind: 'marker', date: marker.date, data: marker }))
    ].sort((a, b) => a.date.localeCompare(b.date) || a.kind.localeCompare(b.kind));

    topLevelItems.forEach(entry => {
        if (entry.kind === 'marker') {
            list.appendChild(createMarkerItem(entry.data));
            return;
        }

        const region = entry.data;
        const group = document.createElement('section');
        group.className = 'region-group';
        group.style.setProperty('--region-color', region.color);

        const header = document.createElement('div');
        header.className = 'region-header';
        const swatch = document.createElement('i');
        swatch.className = 'marker-swatch region';
        swatch.style.setProperty('--marker-color', region.color);
        const kindLabel = document.createElement('span');
        kindLabel.className = 'annotation-kind';
        kindLabel.textContent = '区域';
        const text = document.createElement('span');
        text.className = 'annotation-text';
        text.textContent = `${region.start} — ${region.end}${region.label ? ` · ${region.label}` : ''}`;
        header.append(swatch, kindLabel, text, createRemoveButton(region, 'region', text.textContent));
        enableLabelEditing(header, text, region, 'region');
        group.appendChild(header);

        const nestedMarkers = regionAssignments.get(region.id);
        if (nestedMarkers.length) {
            const nestedList = document.createElement('div');
            nestedList.className = 'region-markers';
            nestedMarkers.forEach(marker => nestedList.appendChild(createMarkerItem(marker)));
            group.appendChild(nestedList);
        }
        list.appendChild(group);
    });
}

function addMarker() {
    const dateInput = document.getElementById('markerDate');
    if (!dateInput.value) {
        dateInput.focus();
        return;
    }
    markers.push({
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        date: dateInput.value,
        label: document.getElementById('markerLabel').value.trim(),
        color: document.getElementById('markerColor').value,
        style: document.getElementById('markerStyle').value
    });
    markers.sort((a, b) => a.date.localeCompare(b.date));
    saveMarkers();
    renderMarkerList();
    document.getElementById('markerLabel').value = '';
    chart?.draw();
}

function addRegion() {
    const startInput = document.getElementById('regionStart');
    const endInput = document.getElementById('regionEnd');
    if (!startInput.value) {
        startInput.focus();
        return;
    }
    if (!endInput.value) {
        endInput.focus();
        return;
    }
    if (startInput.value >= endInput.value) {
        endInput.setCustomValidity('结束月份必须晚于开始月份');
        endInput.reportValidity();
        return;
    }
    endInput.setCustomValidity('');
    regions.push({
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        start: startInput.value,
        end: endInput.value,
        label: document.getElementById('regionLabel').value.trim(),
        color: document.getElementById('regionColor').value
    });
    regions.sort((a, b) => a.start.localeCompare(b.start));
    saveRegions();
    renderMarkerList();
    document.getElementById('regionLabel').value = '';
    chart?.draw();
}

async function init() {
    await loadAnnotations();
    const r = await fetch('/api/data/industry_data.json', { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    RD = await r.json();
    allKeys = Object.keys(RD.revenue_yoy).sort();
    const markerDate = document.getElementById('markerDate');
    markerDate.min = allKeys[0];
    markerDate.max = allKeys[allKeys.length - 1];
    markerDate.value = allKeys[allKeys.length - 1];
    const regionStart = document.getElementById('regionStart');
    const regionEnd = document.getElementById('regionEnd');
    regionStart.min = regionEnd.min = allKeys[0];
    regionStart.max = regionEnd.max = allKeys[allKeys.length - 1];
    regionStart.value = allKeys[Math.max(0, allKeys.length - 13)];
    regionEnd.value = allKeys[allKeys.length - 1];
    document.getElementById('markerAdd').addEventListener('click', addMarker);
    document.getElementById('regionAdd').addEventListener('click', addRegion);
    document.getElementById('markerLabel').addEventListener('keydown', e => {
        if (e.key === 'Enter') addMarker();
    });
    document.getElementById('regionLabel').addEventListener('keydown', e => {
        if (e.key === 'Enter') addRegion();
    });
    regionEnd.addEventListener('input', () => regionEnd.setCustomValidity(''));
    renderMarkerList();
    renderStats();
    buildTicks();
    initSlider();
    setRange('3y');
    document.getElementById('ts').addEventListener('change', () => { ts = document.getElementById('ts').value; syncSliderThumbs(); renderChart(); });
    document.getElementById('te').addEventListener('change', () => { te = document.getElementById('te').value; syncSliderThumbs(); renderChart(); });
}

function appendIndustryUpdateLog(text, type) {
    if (!text) return;
    const log = document.getElementById('industryUpdateLog');
    const line = document.createElement('div');
    if (type) line.className = `log-${type}`;
    line.textContent = text;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

function finishIndustryUpdate(success, message) {
    const progress = document.getElementById('industryUpdateProgress');
    progress.className = 'update-progress-bar';
    progress.style.width = '100%';
    progress.style.background = success
        ? 'linear-gradient(90deg, #38a169, #48bb78)'
        : 'linear-gradient(90deg, #e53e3e, #fc8181)';
    document.getElementById('industryUpdateTitle').textContent =
        success ? '更新完成' : '更新失败';
    document.getElementById('industryUpdateFooter').style.display = 'block';

    const button = document.getElementById('updateIndustryBtn');
    button.disabled = false;
    button.classList.remove('spinning');
    appendIndustryUpdateLog(message, success ? 'success' : 'error');

    if (success) {
        setTimeout(() => window.location.reload(), 800);
    }
}

function startIndustryUpdatePolling() {
    let offset = 0;
    industryUpdatePollTimer = setInterval(async () => {
        try {
            const response = await fetch(`/api/industry/update/status?offset=${offset}`);
            const status = await response.json();
            (status.new_logs || []).forEach(line => appendIndustryUpdateLog(line));
            offset = status.total_logs;

            if (!status.running && status.success !== null) {
                clearInterval(industryUpdatePollTimer);
                industryUpdatePollTimer = null;
                finishIndustryUpdate(
                    status.success,
                    status.success
                        ? '最新工业企业数据已写入，页面即将刷新。'
                        : `更新失败：${status.error || '未知错误'}`
                );
            }
        } catch (_) {
            // 临时网络错误时继续下一轮轮询。
        }
    }, 800);
}

async function triggerIndustryUpdate() {
    const button = document.getElementById('updateIndustryBtn');
    const progress = document.getElementById('industryUpdateProgress');
    document.getElementById('industryUpdateLog').replaceChildren();
    document.getElementById('industryUpdateTitle').textContent = '正在更新工业企业数据';
    document.getElementById('industryUpdateFooter').style.display = 'none';
    document.getElementById('industryUpdateModal').classList.add('visible');
    progress.className = 'update-progress-bar indeterminate';
    progress.style.width = '';
    progress.style.background = '';
    button.disabled = true;
    button.classList.add('spinning');

    try {
        const response = await fetch('/api/industry/update');
        const result = await response.json();
        appendIndustryUpdateLog(result.message);
        if (result.ok) {
            startIndustryUpdatePolling();
        } else {
            finishIndustryUpdate(false, result.message);
        }
    } catch (error) {
        finishIndustryUpdate(false, `请求失败：${error.message}`);
    }
}

function setRange(r) {
    const keys = allKeys;
    const latest = keys[keys.length - 1];
    const [ly, lm] = latest.split('-').map(Number);
    if (r === '1y') ts = `${ly-1}-${String(lm).padStart(2,'0')}`;
    else if (r === '3y') ts = `${ly-3}-${String(lm).padStart(2,'0')}`;
    else ts = keys[0];
    te = latest;
    document.getElementById('ts').value = ts;
    document.getElementById('te').value = te;
    // 更新按钮状态
    document.querySelectorAll('.tb-btn').forEach(b => b.classList.toggle('on', b.textContent === (r==='1y'?'近1年':r==='3y'?'近3年':'全部')));
    syncSliderThumbs();
    renderChart();
}

// ---------------- 时间范围拖动条 ----------------
function nearestIdx(key) {
    if (!allKeys.length) return 0;
    for (let i = 0; i < allKeys.length; i++) { if (allKeys[i] >= key) return i; }
    return allKeys.length - 1;
}

function buildTicks() {
    const box = document.getElementById('rngTicks');
    const N = Math.max(allKeys.length - 1, 1);
    const seen = {};
    let html = '';
    allKeys.forEach((k, i) => {
        const y = k.slice(0, 4);
        if (!seen[y]) { seen[y] = true; html += `<span class="rng-tick" style="left:${(i / N * 100).toFixed(3)}%">${y}</span>`; }
    });
    box.innerHTML = html;
}

function layoutThumbs() {
    const N = Math.max(allKeys.length - 1, 1);
    const pa = ai / N * 100, pb = bi / N * 100;
    document.getElementById('thumbA').style.left = pa + '%';
    document.getElementById('thumbB').style.left = pb + '%';
    const fill = document.getElementById('rngFill');
    fill.style.left = pa + '%';
    fill.style.width = (pb - pa) + '%';
    document.getElementById('labA').textContent = allKeys[ai] || '';
    document.getElementById('labB').textContent = allKeys[bi] || '';
}

function syncSliderThumbs() {
    ai = nearestIdx(ts);
    bi = nearestIdx(te);
    if (ai > bi) { const t = ai; ai = bi; bi = t; }
    layoutThumbs();
}

function initSlider() {
    const track = document.getElementById('rngTrack');
    const idxFromEvent = (e) => {
        const rect = track.getBoundingClientRect();
        const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
        return Math.round(frac * Math.max(allKeys.length - 1, 1));
    };
    const applyDrag = (e) => {
        if (!dragThumb) return;
        const idx = idxFromEvent(e);
        if (dragThumb === 'A') ai = Math.min(idx, bi);
        else bi = Math.max(idx, ai);
        ts = allKeys[ai]; te = allKeys[bi];
        document.getElementById('ts').value = ts;
        document.getElementById('te').value = te;
        document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('on'));
        layoutThumbs();
        renderChart();
    };
    const start = (thumb) => (e) => { dragThumb = thumb; e.preventDefault(); };
    document.getElementById('thumbA').addEventListener('pointerdown', start('A'));
    document.getElementById('thumbB').addEventListener('pointerdown', start('B'));
    // 点击轨道：移动最近的手柄
    track.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.rng-thumb')) return;
        const idx = idxFromEvent(e);
        dragThumb = (Math.abs(idx - ai) <= Math.abs(idx - bi)) ? 'A' : 'B';
        applyDrag(e);
    });
    window.addEventListener('pointermove', applyDrag);
    window.addEventListener('pointerup', () => { dragThumb = null; });
}

function renderStats() {
    const rk = Object.keys(RD.revenue_yoy).sort();
    const latest = rk[rk.length-1];
    const rev = RD.revenue_yoy[latest];
    const inv = RD.inventory_yoy[latest];
    document.getElementById('sc').innerHTML = `
        <div class="scd"><div class="l">营业收入 同比</div><div class="v ${rev>=0?'r':'g'}">${(rev>=0?'+':'')+rev.toFixed(1)}%</div><div class="l" style="font-size:11px">${latest}</div></div>
        <div class="scd"><div class="l">产成品存货 同比</div><div class="v ${inv>=0?'r':'g'}">${(inv>=0?'+':'')+inv.toFixed(1)}%</div><div class="l" style="font-size:11px">${latest}</div></div>
        <div class="scd"><div class="l">数据来源</div><div class="v" style="font-size:14px;color:#667eea;">国家统计局</div></div>
        <div class="scd"><div class="l">数据月份</div><div class="v" style="font-size:14px;">${rk.length} 个</div><div class="l" style="font-size:11px">${rk[0]} ~ ${latest}</div></div>
    `;
    // 源链接
    const sl = RD.source_urls && RD.source_urls[latest];
    document.getElementById('srcLink').href = sl || '#';
    document.getElementById('srcLink').textContent = sl ? latest : '';
}

function renderChart() {
    if (chart) chart.destroy();
    const rk = Object.keys(RD.revenue_yoy).filter(k => k >= ts && k <= te).sort();

    const datasets = [
        {
            label: '营业收入 累积同比 (%)',
            data: rk.map(k => ({ x: parseDate(k).getTime(), y: RD.revenue_yoy[k] })).filter(p => p.y != null),
            borderColor: COLORS.revenue,
            backgroundColor: 'rgba(231,76,60,0.06)',
            fill: true,
            tension: 0.15,
            borderWidth: 2.5,
            pointRadius: 3,
            pointHoverRadius: 6,
        },
        {
            label: '产成品存货 同比 (%)',
            data: rk.map(k => ({ x: parseDate(k).getTime(), y: RD.inventory_yoy[k] })).filter(p => p.y != null),
            borderColor: COLORS.inventory,
            backgroundColor: 'transparent',
            tension: 0.15,
            borderWidth: 2.5,
            pointRadius: 3,
            pointHoverRadius: 6,
            borderDash: [5, 3],
            fill: false,
        },
    ];

    const ctx = document.getElementById('chart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        plugins: [verticalMarkerPlugin],
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top', labels: { usePointStyle: true, padding: 16, font: { size: 12 } } },
                tooltip: { callbacks: { label: c => c.dataset.label.replace('(%)','') + ': ' + (c.raw.y>=0?'+':'') + c.raw.y.toFixed(1) + '%' } }
            },
            scales: {
                x: { type: 'time', time: { unit: 'month', displayFormats: { month: 'yyyy-MM' } }, grid: { display: false } },
                y: { title: { display: true, text: '%' }, grid: { color: '#f0f0f0' } }
            }
        }
    });
}

document.getElementById('updateIndustryBtn').addEventListener('click', triggerIndustryUpdate);
document.getElementById('closeIndustryUpdateBtn').addEventListener('click', () => {
    document.getElementById('industryUpdateModal').classList.remove('visible');
});
init().catch(e => document.body.innerHTML = `<div style="text-align:center;padding:60px;color:#e74c3c;">加载失败: ${e.message}</div>`);
</script>
